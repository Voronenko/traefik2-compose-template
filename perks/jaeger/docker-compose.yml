services:
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    expose:
      - "13133"   # Healthcheck (for external monitoring)
    depends_on:
      - jaeger
    networks:
      - otel_jaeger
    # Note: otel-collector uses distroless image without shell, healthcheck via external monitoring recommended
    # curl http://localhost:13133/ from host or use monitoring system

  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: jaeger
    volumes:
      - ./jaeger-data:/jaeger_storage
      - ./jaeger-config.yaml:/etc/jaeger/config.yaml
    command: ["--config=/etc/jaeger/config.yaml"]
    expose:
      - "16686"   # HTTP UI
      - "16685"   # gRPC API
      - "14250"   # Jaeger gRPC ingest
      - "4317"    # OTLP gRPC (internal, from otel-collector)
      - "4318"    # OTLP HTTP (internal, from otel-collector)
      - "8888"    # Prometheus metrics
      - "13133"   # Healthcheck /status
    ports:
      - "16686:16686"
      - "16685:16685"
      - "14250:14250"
      - "8888:8888"
    networks:
      - otel_jaeger
      - traefik-public
    labels:
      - "traefik.enable=true"

      # HTTP
      - "traefik.http.routers.jaeger.rule=Host(`jaeger.fiks.im`)"
      - "traefik.http.routers.jaeger.entrypoints=web"
      - "traefik.http.routers.jaeger.service=jaeger"

      # HTTPS
      - "traefik.http.routers.jaeger-secure.rule=Host(`jaeger.fiks.im`)"
      - "traefik.http.routers.jaeger-secure.entrypoints=websecure"
      - "traefik.http.routers.jaeger-secure.tls=true"
      - "traefik.http.routers.jaeger-secure.service=jaeger"

      # Service
      - "traefik.http.services.jaeger.loadbalancer.server.port=16686"

    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "nc -z 127.0.0.1 13133 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    restart: unless-stopped

networks:
  otel_jaeger:
    driver: bridge
  traefik-public:
    external: true
