service:
  extensions:
    - jaeger_storage
    - jaeger_query
    - healthcheckv2
  pipelines:
    traces:
      receivers: [jaeger, otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter]
  telemetry:
    resource:
      service.name: jaeger-all-in-one
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
    logs:
      level: info

extensions:
  healthcheckv2:
    use_v2: true
    http:

  jaeger_storage:
    backends:
      badger:
        badger:
          directories:
            keys: "/jaeger_storage/"
            values: "/jaeger_storage/"
          ephemeral: false
          ttl:
            spans: 168h  # 7 days auto-cleanup
          metrics_update_interval: 10s

  jaeger_query:
    storage:
      traces: badger
    base_path: /
    http:
      endpoint: 0.0.0.0:16686
    grpc:
      endpoint: 0.0.0.0:16685

receivers:
  jaeger:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14250

  # Internal OTLP receiver for otel-collector (via docker network)
  # To use direct OTLP from apps, remove otel-collector and expose ports 4317/4318
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  jaeger_storage_exporter:
    trace_storage: badger
